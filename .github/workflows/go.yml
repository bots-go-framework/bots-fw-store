name: Go CI

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+\.[0-9]+\.[0-9]+' # Push events to matching v*, i.e. v20.15.10
  pull_request:
    branches:
      - '**'

jobs:

  strongo_workflow:
    permissions:
      contents: write
    uses: strongo/cicd/.github/workflows/workflow.yml@main
    with:
      # The shared semantic-release step currently requires package.json even
      # for Go-only modules. Keep CI green and publish explicit v0 tags.
      disable-version-bumping: true
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
